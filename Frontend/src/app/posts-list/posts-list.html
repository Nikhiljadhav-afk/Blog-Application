<div class="posts-list-container">
  <h1 class="title">All Posts</h1>

  <div class="filter-section" *ngIf="!loading && !error && categories.length > 0">
    <label for="category-filter">Filter by Category:</label>
    <select id="category-filter" [(ngModel)]="selectedCategory" (ngModelChange)="onCategoryChange()">
      <option value="">All Categories</option>
      <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
    </select>
  </div>

  <div *ngIf="loading" class="loading">
    <p>Loading posts...</p>
  </div>

  <div *ngIf="error" class="error">
    <p>{{ error }}</p>
  </div>

  <div *ngIf="success" class="success">
    <p>{{ success }}</p>
  </div>

  <div *ngIf="!loading && !error" class="posts-grid">
    <div *ngFor="let post of posts" class="post-card" (click)="viewPost(post.id)">
      <div class="post-header">
        <h2 class="post-title">{{ post.title }}</h2>
        <p class="post-author">By {{ post.authorName }}</p>
      </div>
      <div class="post-content" [innerHTML]="(post.content || '').substring(0, 200) + '...'"></div>
      <div class="post-footer">
        <span class="category">{{ post.categoryName }}</span>
        <span class="comments">{{ post.commentCount }} comments</span>
        <button *ngIf="isAdmin" class="delete-btn" (click)="deletePost(post.id); $event.stopPropagation()">Delete</button>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && !error && posts.length === 0" class="no-posts">
    <p>No posts available.</p>
  </div>

  <div *ngIf="!loading && !error && totalPages > 1" class="pagination">
    <button class="btn btn-secondary" (click)="prevPage()" [disabled]="currentPage === 0">Previous</button>
    <span class="page-info">Page {{ currentPage + 1 }} of {{ totalPages }}</span>
    <button class="btn btn-secondary" (click)="nextPage()" [disabled]="currentPage === totalPages - 1">Next</button>
  </div>
</div>
