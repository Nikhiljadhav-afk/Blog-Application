spring.application.name=BlogAppBackend
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/blogapplication
spring.datasource.username=root
spring.datasource.password=root
server.port=8181
# Hibernate / JPA Settings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Optional: Show SQL in console for debugging
spring.jpa.show-sql=true

jwt.secret=MySuperSecretKey123456
jwt.expiration=3600000
jwt.refresh.expiration=86400000
app.jwt.refresh-expiration-ms=86400000

app.jwt.secret=THIS_IS_A_32_BYTE_MINIMUM_SECRET_KEY_123456
